<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Page not found — Foilcraft Print Studio. Return to our homepage and explore our premium foil stamping services.">
    <title>404 — Page Not Found | Foilcraft</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100' fill='none'%3E%3Ccircle cx='50' cy='50' r='47' stroke='%23C9A96E' stroke-width='2' stroke-opacity='0.4' fill='none'/%3E%3Cpath d='M50 15 L75 40 L75 60 L50 85 L25 60 L25 40 Z' fill='%23C9A96E' fill-opacity='0.15' stroke='%23C9A96E' stroke-width='2'/%3E%3Cpath d='M40 38 L40 62 M40 38 L60 38 M40 50 L55 50' stroke='%23C9A96E' stroke-width='3.5' stroke-linecap='round'/%3E%3C/svg%3E">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script>tailwind.config={darkMode:'class',theme:{extend:{colors:{primary:'#C9A96E',secondary:'#1A1A2E'}}}}</script>
</head>
<body>
<div class="min-h-screen flex flex-col items-center justify-center relative overflow-hidden px-4 py-16" style="background:linear-gradient(145deg,#0A0814 0%,#1A1A2E 100%);">
    <!-- Top-right controls -->
    <div class="auth-top-icons">
        <button class="icon-btn dark-toggle" title="Toggle Dark Mode"><i class="fas fa-moon"></i></button>
        <button class="icon-btn rtl-toggle" title="Toggle RTL"><i class="fas fa-exchange-alt"></i></button>
    </div>

    <!-- Background decorations -->
    <div class="absolute inset-0 pointer-events-none">
        <div class="absolute w-[600px] h-[600px] rounded-full" style="background:radial-gradient(circle,rgba(201,169,110,0.08) 0%,transparent 70%);top:-200px;right:-200px;"></div>
        <div class="absolute w-[400px] h-[400px] rounded-full" style="background:radial-gradient(circle,rgba(201,169,110,0.06) 0%,transparent 70%);bottom:-150px;left:-150px;"></div>
        <div class="absolute inset-0" style="background-image:linear-gradient(rgba(201,169,110,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(201,169,110,0.03) 1px,transparent 1px);background-size:60px 60px;"></div>
    </div>

    <!-- Content -->
    <div class="relative z-10 text-center max-w-2xl">
        <!-- Logo -->
        <div class="mb-14">
            <a href="index.html" class="inline-flex items-center gap-2.5 group">
                <svg width="32" height="32" viewBox="0 0 100 100" fill="none">
                    <defs><linearGradient id="g404" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#C9A96E"/><stop offset="50%" stop-color="#F2D98A"/><stop offset="100%" stop-color="#C9A96E"/></linearGradient></defs>
                    <circle cx="50" cy="50" r="47" stroke="#C9A96E" stroke-width="2" stroke-opacity="0.4" fill="none"/>
                    <path d="M50 15 L75 40 L75 60 L50 85 L25 60 L25 40 Z" fill="url(#g404)" fill-opacity="0.12" stroke="url(#g404)" stroke-width="2"/>
                    <path d="M40 38 L40 62 M40 38 L60 38 M40 50 L55 50" stroke="#C9A96E" stroke-width="3.5" stroke-linecap="round"/>
                </svg>
                <span class="font-bold text-xl text-white group-hover:text-[#C9A96E] transition-colors" style="font-family:'Cormorant Garamond',serif;">Foilcraft</span>
            </a>
        </div>

        <!-- 404 Stamp -->
        <div class="mb-8">
            <div class="relative inline-block">
                <!-- Decorative stamp border -->
                <div class="absolute inset-0 rounded-3xl border-2 border-dashed border-[#C9A96E]/30 scale-110"></div>
                <div class="relative px-10 py-8 rounded-3xl" style="background:rgba(201,169,110,0.06);border:1px solid rgba(201,169,110,0.2);">
                    <div class="text-[7rem] sm:text-[9rem] font-bold leading-none" style="font-family:'Cormorant Garamond',serif;background:linear-gradient(135deg,#C9A96E 0%,#F2D98A 40%,#C9A96E 70%,#9E7D46 100%);background-size:200% auto;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;animation:goldShimmer 4s linear infinite;">404</div>
                    <!-- Emboss stamp effect text -->
                    <div class="absolute top-3 right-4 text-[10px] text-[#C9A96E]/50 font-bold uppercase tracking-[0.2em] rotate-12">NOT FOUND</div>
                    <div class="absolute bottom-3 left-4 text-[10px] text-[#C9A96E]/40 font-bold uppercase tracking-[0.15em] -rotate-6">FOILCRAFT</div>
                </div>
            </div>
        </div>

        <h1 class="text-white mb-4" style="font-family:'Cormorant Garamond',serif;font-size:clamp(1.8rem,4vw,2.8rem);">
            This Page Has <span style="background:linear-gradient(135deg,#C9A96E,#F2D98A);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;">Left the Press</span>
        </h1>
        <p class="text-neutral-400 text-lg mb-10 max-w-lg mx-auto">The page you're looking for has been moved, removed, or never existed. Even our finest foil can't bring it back.</p>

        <div class="flex flex-col sm:flex-row gap-4 justify-center mb-12">
            <a href="index.html" class="btn btn-primary btn-lg btn-shine">
                <i class="fas fa-house text-xs"></i> Back to Home
            </a>
            <a href="contact.html" class="btn btn-lg" style="border:1.5px solid rgba(201,169,110,0.4);color:#C9A96E;">
                <i class="fas fa-envelope text-xs"></i> Contact Studio
            </a>
        </div>

        <!-- Quick links -->
        <div class="flex flex-wrap justify-center gap-4">
            <a href="services.html" class="text-xs text-neutral-500 hover:text-[#C9A96E] transition-colors uppercase tracking-widest font-semibold">Services</a>
            <span class="text-neutral-700">·</span>
            <a href="gallery.html" class="text-xs text-neutral-500 hover:text-[#C9A96E] transition-colors uppercase tracking-widest font-semibold">Gallery</a>
            <span class="text-neutral-700">·</span>
            <a href="pricing.html" class="text-xs text-neutral-500 hover:text-[#C9A96E] transition-colors uppercase tracking-widest font-semibold">Pricing</a>
            <span class="text-neutral-700">·</span>
            <a href="about.html" class="text-xs text-neutral-500 hover:text-[#C9A96E] transition-colors uppercase tracking-widest font-semibold">About</a>
        </div>
    </div>
</div>

<script src="script.js"></script>
<style>
@keyframes goldShimmer { 0% { background-position:-200% center; } 100% { background-position:200% center; } }
</style>
</body>
</html>
